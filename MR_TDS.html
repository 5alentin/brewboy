<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mr. TDS</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="icon" href="icon.png" type="image/png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BrewBoy" />
  <meta name="theme-color" content="#1e1e1e" />
  <style>
    body { display: block !important; padding: 0 !important; }

    .tds-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 72px 20px 60px;
      max-width: 480px;
      margin: 0 auto;
      box-sizing: border-box;
    }

    .tds-page h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .tds-subtitle { color: #888; font-size: 0.8rem; margin-bottom: 24px; }

    /* Mode toggle */
    .mode-toggle {
      display: flex;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
      width: 100%;
      box-sizing: border-box;
    }
    .mode-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: #888;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      max-width: none;
    }
    .mode-btn.active {
      background: #4f43ae;
      color: #fff;
    }

    /* Input card */
    .input-card {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 14px;
      padding: 20px;
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 16px;
      transition: border-color 0.4s ease;
    }
    .input-card.zone-ideal  { border-color: #28a745; }
    .input-card.zone-over   { border-color: #e67e22; }
    .input-card.zone-under  { border-color: #2980b9; }

    .input-row {
      display: flex;
      flex-direction: column;
      margin-bottom: 16px;
    }
    .input-row:last-of-type { margin-bottom: 0; }

    .input-row label {
      font-size: 0.78rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .input-row input {
      background: #1e1e1e;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 12px;
      color: #f0f0f0;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      width: 100%;
      box-sizing: border-box;
    }
    .input-row input::placeholder {
  color: #555;
  font-size: 0.85rem;
}
    .input-row input:focus { outline: none; border-color: #7c71e0; }

    /* Result card */
    .result-card {
      width: 100%;
      box-sizing: border-box;
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      background: #2a2a2a;
      border: 1px solid #444;
      transition: background 0.4s ease, border-color 0.4s ease;
      margin-bottom: 16px;
    }
    .result-card.zone-ideal  { background: #1a3a22; border-color: #28a745; }
    .result-card.zone-over   { background: #3a2710; border-color: #e67e22; }
    .result-card.zone-under  { background: #0f2a3a; border-color: #2980b9; }

    .result-value {
      font-size: 3.5rem;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      color: #f0f0f0;
      line-height: 1;
      margin-bottom: 6px;
    }
    .result-label {
      font-size: 0.78rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }
    .result-verdict {
      font-size: 1rem;
      font-weight: 600;
      color: #f0f0f0;
      margin-bottom: 4px;
    }
    .result-hint {
      font-size: 0.8rem;
      color: #aaa;
      line-height: 1.4;
    }

    /* Target range card */
    .range-card {
      width: 100%;
      box-sizing: border-box;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 14px 16px;
    }
    .range-title {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }
    .range-rows { display: flex; flex-direction: column; gap: 6px; }
    .range-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: #888;
    }
    .range-row span:last-child { color: #a78bfa; font-family: 'Courier New', monospace; }
  </style>
</head>
<body>
  <div class="hamburger-container">
    <div class="hamburger" id="hamburger-icon">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <nav class="menu" id="menu">
      <ul>
        <li><a href="index.html">BrewBoy</a></li>
        <li><a href="TIMER.html">TIMER</a></li>
        <li><a href="MR_TDS.html">MR.TDS</a></li>
      </ul>
    </nav>
  </div>

  <div class="tds-page">
    <h1>Mr.TDS ෴</h1>
    <p class="tds-subtitle">Extraction Yield Calculator</p>

    <!-- Mode toggle -->
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-filter" onclick="setMode('filter')">filter</button>
      <button class="mode-btn" id="btn-espresso" onclick="setMode('espresso')">espresso</button>
    </div>

    <!-- Inputs -->
    <div class="input-card" id="inputCard">
      <div class="input-row">
        <label id="tds-label">TDS (%)</label>
        <input type="number" id="tds" placeholder="e.g. 1.35" step="any" inputmode="decimal">
      </div>
      <div class="input-row">
        <label>Dose (g)</label>
        <input type="number" id="dose" placeholder="e.g. 15" inputmode="decimal">
      </div>
      <div class="input-row">
        <label id="yield-label">Yield (g)</label>
        <input type="number" id="yield" placeholder="e.g. 250" step="any" inputmode="decimal">
      </div>
    </div>

    <!-- Result -->
    <div class="result-card" id="resultCard">
      <div class="result-value" id="resultValue">—</div>
      <div class="result-label">Extraction Yield</div>
      <div class="result-verdict" id="resultVerdict">Enter values above</div>
      <div class="result-hint" id="resultHint"></div>
    </div>

    <!-- Target ranges -->
    <div class="range-card" id="rangeCard">
      <div class="range-title" id="rangeTitle">Filter targets</div>
      <div class="range-rows">
        <div class="range-row"><span>Extraction Yield</span><span id="rangeEY">18 – 22%</span></div>
        <div class="range-row"><span>TDS</span><span id="rangeTDS">1.15 – 1.45%</span></div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('hamburger-icon').addEventListener('click', () => {
      document.getElementById('menu').classList.toggle('active');
    });

    // ── Mode config ────────────────────────────────────────
    const modes = {
      filter: {
        tdsLabel: 'TDS (%)',
        tdsPlaceholder: 'e.g. 1.35',
        yieldLabel: 'Yield (g)',
        yieldPlaceholder: 'e.g. 250',
        rangeTitle: 'Filter targets (SCA)',
        rangeEY: '18 – 22%',
        rangeTDS: '1.15 – 1.45%',
        idealEY: [18, 22],
        idealTDS: [1.15, 1.45],
        verdicts: {
          ideal:  { text: '✓ In the zone',        hint: 'Balanced extraction. Well done.' },
          over:   { text: '↑ Over-extracted',      hint: 'Try a coarser grind or shorter brew time.' },
          under:  { text: '↓ Under-extracted',     hint: 'Try a finer grind or longer brew time.' },
          weakTDS:{ text: '↓ Weak / thin',         hint: 'TDS is low. Try a higher dose or finer grind.' },
          strongTDS:{ text:'↑ Strong / bitter',    hint: 'TDS is high. Try a lower dose or coarser grind.' },
        }
      },
      espresso: {
        tdsLabel: 'TDS (%)',
        tdsPlaceholder: 'e.g. 9.5',
        yieldLabel: 'Yield (g)',
        yieldPlaceholder: 'e.g. 36',
        rangeTitle: 'Espresso targets (SCA)',
        rangeEY: '18 – 22%',
        rangeTDS: '8 – 12%',
        idealEY: [18, 22],
        idealTDS: [8, 12],
        verdicts: {
          ideal:  { text: '✓ In the zone',        hint: 'Balanced extraction. Well done.' },
          over:   { text: '↑ Over-extracted',      hint: 'Try a coarser grind or shorter shot.' },
          under:  { text: '↓ Under-extracted',     hint: 'Try a finer grind or longer shot.' },
          weakTDS:{ text: '↓ Weak / thin',         hint: 'TDS is low. Try a finer grind or more dose.' },
          strongTDS:{ text:'↑ Strong / bitter',    hint: 'TDS is high. Try a coarser grind or less dose.' },
        }
      }
    };

    let currentMode = 'filter';

    function setMode(mode) {
      currentMode = mode;
      const m = modes[mode];
      document.getElementById('btn-filter').classList.toggle('active', mode === 'filter');
      document.getElementById('btn-espresso').classList.toggle('active', mode === 'espresso');
      document.getElementById('tds-label').textContent = m.tdsLabel;
      document.getElementById('tds').placeholder = m.tdsPlaceholder;
      document.getElementById('yield-label').textContent = m.yieldLabel;
      document.getElementById('yield').placeholder = m.yieldPlaceholder;
      document.getElementById('rangeTitle').textContent = m.rangeTitle;
      document.getElementById('rangeEY').textContent = m.rangeEY;
      document.getElementById('rangeTDS').textContent = m.rangeTDS;
      document.getElementById('tds').value = '';
      document.getElementById('dose').value = '';
      document.getElementById('yield').value = '';
      resetResult();
    }

    function resetResult() {
      const rc = document.getElementById('resultCard');
      const ic = document.getElementById('inputCard');
      rc.className = 'result-card';
      ic.className = 'input-card';
      document.getElementById('resultValue').textContent = '—';
      document.getElementById('resultVerdict').textContent = 'Enter values above';
      document.getElementById('resultHint').textContent = '';
    }

    function calculate() {
      const tds = parseFloat(document.getElementById('tds').value);
      const dose = parseFloat(document.getElementById('dose').value);
      const yieldVal = parseFloat(document.getElementById('yield').value);

      if (isNaN(tds) || isNaN(dose) || isNaN(yieldVal) || tds <= 0 || dose <= 0 || yieldVal <= 0) {
        resetResult(); return;
      }

      const ey = (tds * yieldVal) / dose;
      const m = modes[currentMode];
      const rc = document.getElementById('resultCard');
      const ic = document.getElementById('inputCard');

      document.getElementById('resultValue').textContent = ey.toFixed(2) + '%';

      // Determine zone
      let zone, verdict;
      const eyIdeal = ey >= m.idealEY[0] && ey <= m.idealEY[1];
      const tdsIdeal = tds >= m.idealTDS[0] && tds <= m.idealTDS[1];

      if (eyIdeal && tdsIdeal) {
        zone = 'ideal';
      } else if (ey > m.idealEY[1]) {
        zone = 'over';
      } else if (tds > m.idealTDS[1]) {
        zone = 'strongTDS';
      } else if (tds < m.idealTDS[0]) {
        zone = 'weakTDS';
      } else {
        zone = 'under';
      }

      verdict = m.verdicts[zone];
      const zoneClass = (zone === 'ideal') ? 'zone-ideal' : (zone === 'over' || zone === 'strongTDS') ? 'zone-over' : 'zone-under';

      rc.className = `result-card ${zoneClass}`;
      ic.className = `input-card ${zoneClass}`;
      document.getElementById('resultVerdict').textContent = verdict.text;
      document.getElementById('resultHint').textContent = verdict.hint;
    }

    ['tds','dose','yield'].forEach(id => {
      document.getElementById(id).addEventListener('input', calculate);
    });
  </script>
</body>
</html>
